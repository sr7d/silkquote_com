---
layout: default
---

<div class="install-page">

  <div class="page-hero-bg">
  <div class="container">
    <div class="install-hero">

      <!-- Left: video + prerequisites -->
      <div class="install-hero__left">
        <div class="install-video-wrap">
          <div class="install-video-placeholder"></div>
          <iframe
            class="lazy"
            data-src="https://player.vimeo.com/video/1114259071/?autoplay=1&muted=1&loop=0&background=1&controls=0"
            frameborder="0"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
          </iframe>
          <div class="video-overlay" id="video-overlay">
            <div class="play-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5v14l11-7z" fill="currentColor"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: form + prerequisites -->
      <div class="install-hero__right">

        <div class="install-form-card">
          <h2 class="install-form-card__heading">Install the SilkQuote App</h2>
          <p>Please enter your email below so we may keep you up to date as new features and bug fixes release.</p>
          <iframe name="sf-submit-target" style="display:none" aria-hidden="true"></iframe>
          <form id="install-lead-form" action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Da500001Nhn69" method="POST" class="install-lead-form" target="sf-submit-target">
            <input type="hidden" name="oid" value="00Da500001Nhn69">
            <input type="hidden" name="retURL" value="https://silkquote.com/">
            <input type="hidden" name="lead_source" value="silkquote.com/install">
            <div class="install-lead-form__field">
              <!-- <label for="email">Business Email</label> -->
              <input id="email" name="email" type="email" maxlength="80" placeholder="your-email@company.com" required autocomplete="email">
              <span class="install-lead-form__error" id="email-error"></span>
            </div>
            <div class="install-env-picker">
              <label class="install-env-picker__option">
                <input type="radio" name="install_env" value="production" checked>
                <span>Production</span>
              </label>
              <label class="install-env-picker__option">
                <input type="radio" name="install_env" value="sandbox">
                <span>Sandbox</span>
              </label>
            </div>
            <div class="install-lead-form__footer">
              <button type="submit" class="button button--primary install-lead-form__submit">Install Now</button>
              {% if site.data.settings.appexchange_url %}
              <a href="{{ site.data.settings.appexchange_url }}" class="install-appexchange-badge" target="_blank" rel="noopener">
                <img src="/images/appExchange.png" alt="Available on Salesforce AppExchange">
              </a>
              {% else %}
              <img src="/images/appExchange.png" alt="Available on Salesforce AppExchange" class="install-appexchange-badge">
              {% endif %}
            </div>
          </form>

          <!-- <ul class="install-trust-list">
            <li>Free</li>
            <li>Native Lightning</li>
            <li>Installs in minutes</li>
          </ul> -->

          <script>
          (function() {
            var PERSONAL_DOMAINS = ['gmail.com','yahoo.com','hotmail.com','outlook.com','live.com','icloud.com','me.com','aol.com','msn.com','protonmail.com','proton.me','mail.com','ymail.com','googlemail.com','yahoo.co.uk','hotmail.co.uk','hotmail.fr','yahoo.fr','wanadoo.fr','comcast.net','sbcglobal.net','verizon.net','att.net','cox.net','earthlink.net','optonline.net'];

            var prodUrl = '{{ site.data.settings.production_install_url }}';
            var sandboxUrl = '{{ site.data.settings.sandbox_install_url }}';

            var form = document.getElementById('install-lead-form');
            var emailInput = document.getElementById('email');
            var emailError = document.getElementById('email-error');
            var successMsg = document.getElementById('install-success');
            var iframe = document.querySelector('[name="sf-submit-target"]');

            form.addEventListener('submit', function(e) {
              var domain = emailInput.value.split('@')[1];
              if (domain && PERSONAL_DOMAINS.indexOf(domain.toLowerCase()) !== -1) {
                e.preventDefault();
                emailError.textContent = 'Please use your business email address.';
                emailInput.focus();
                return;
              }
              emailError.textContent = '';

              var env = document.querySelector('input[name="install_env"]:checked').value;
              var installUrl = env === 'sandbox' ? sandboxUrl : prodUrl;
              if (installUrl) {
                window.open(installUrl, '_blank');
              }

              iframe.addEventListener('load', function onLoad() {
                iframe.removeEventListener('load', onLoad);
                emailInput.value = '';
                successMsg.style.display = 'block';
              });
            });

            emailInput.addEventListener('input', function() {
              emailError.textContent = '';
            });
          })();
          </script>
        </div>

      </div>
    </div>
  </div>
  </div>

  <!-- Post-Installation Instructions -->
  <div class="container animate">
    <article class="post install-instructions">
      <div class="install-instructions__heading">
      </div>
      <div class="post__content">
        {{ content }}
      </div>
    </article>
  </div>

</div>

<style>
  /* Two-column hero grid */
  .install-hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
    padding: 10rem 0 4rem;
    margin-bottom: 3rem;
  }

  /* Left column */
  .install-hero__left {
    position: sticky;
    top: 8rem;
  }

  .install-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: var(--border-radius-large);
    overflow: hidden;
    cursor: pointer;
    margin-bottom: 1.5rem;
  }

  .install-video-placeholder {
    position: absolute;
    inset: 0;
    background: #2a2938;
    z-index: 2;
    animation: video-fade-out 1.2s ease 1.8s both;
  }

  .install-video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    animation: video-fade-in 1.2s ease 1.8s both;
  }

  @keyframes video-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes video-fade-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

.install-video-wrap .video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .install-video-wrap .play-icon {
    width: 56px;
    height: 56px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2c2c2c;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
  }

  .install-video-wrap .video-overlay:hover .play-icon {
    transform: scale(1.1);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  }

  .install-prereqs__heading {
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .install-prereqs__list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .install-prereqs__list li {
    font-size: 0.85rem;
    color: var(--text-secondary);
    padding-left: 1.4rem;
    position: relative;
    line-height: 1.5;
  }

  .install-prereqs__list li::before {
    content: "✓";
    position: absolute;
    left: 0;
    color: var(--primary-color);
    font-weight: 700;
  }

  /* Right column */
  .install-hero__right {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* Form card */
  .install-form-card__heading {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
  }

  .install-lead-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .install-lead-form__field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .install-lead-form__field label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .install-lead-form__field input {
    background: #fff;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
    font-size: 0.9rem;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    box-sizing: border-box;
  }

  .install-lead-form__field input::placeholder {
    color: #aaa;
  }

  .install-lead-form__field input:focus {
    border-color: var(--primary-color);
  }

  .install-lead-form__error {
    font-size: 0.8rem;
    color: #f87171;
    min-height: 1em;
  }

  .install-env-picker {
    display: flex;
    gap: 1.25rem;
    flex-wrap: nowrap;
    margin-bottom: 0.25rem;
  }

  .install-env-picker__option {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .install-env-picker__option input[type="radio"] {
    accent-color: var(--primary-color);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .install-lead-form__footer {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .install-lead-form__submit {
    flex-shrink: 0;
    font-size: 0.8em;
  }

  .install-appexchange-badge img,
  img.install-appexchange-badge {
    display: block;
    height: 51px;
    width: auto;
  }

  .install-lead-form__success {
    font-size: 0.9rem;
    margin: 0;
    color: #4ade80;
  }

  /* Trust indicators */
  .install-trust-list {
    list-style: none;
    padding: 0;
    margin: 1.25rem 0 0;
    display: flex;
    gap: 1.5rem;
    flex-wrap: nowrap;
  }

  .install-trust-list li {
    font-size: 0.85rem;
    color: var(--text-secondary);
    padding-left: 1.25rem;
    position: relative;
  }

  .install-trust-list li::before {
    content: "✓";
    position: absolute;
    left: 0;
    color: var(--primary-color);
    font-weight: 700;
  }

  /* Post-install instructions */
  .install-instructions__heading {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-light);
  }

  .install-instructions__heading h2 {
    margin-bottom: 0.4rem;
  }

  .install-instructions__heading p {
    color: var(--text-secondary);
    margin: 0;
  }

  /* Install callout block */
  .install-callout {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    border: 1px solid rgba(160, 160, 180, 0.25);
    border-radius: 8px;
    padding: 1.1rem 1.25rem;
    margin: 2rem 0;
    background: rgba(255, 255, 255, 0.03);
  }

  .install-callout__icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    margin-top: 0.1rem;
    color: var(--text-secondary);
  }

  .install-callout__body {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .install-callout__title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .install-callout__text {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin: 0;
    line-height: 1.6;
  }

  @media (max-width: 768px) {
    .install-hero {
      grid-template-columns: 1fr;
      gap: 2.5rem;
      padding: 6rem 0 2.5rem;
    }

    .install-hero__left {
      position: static;
    }

    .install-hero__title {
      font-size: 1.85rem;
    }
  }
</style>
