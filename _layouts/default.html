---
layout: compress
---
<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body>
  <div id="page-loader" aria-hidden="true"></div>

  {% if site.data.settings.google-analytics %}
    {% include google-analytics.html %}
  {% endif %}

  <!-- begin global wrap -->
  <div class="global-wrap">

    {% include header.html %}
  
    <!-- begin content -->
    <main class="content" aria-label="Content">
      {{ content }}
    </main>
    <!-- end content -->
  
    {% include footer.html %}
  </div>
  <!-- end global wrap -->

  <script src="{{ site.baseurl }}/js/scripts.js" defer></script>
  <script src="{{ site.baseurl }}/js/common.js" defer></script>

  <script>
    (function() {
      try {
        var NAV_KEY = 'sq_nav_path';
        var MAX_PAGES = 15;
        var raw = sessionStorage.getItem(NAV_KEY);
        var pages = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(pages)) { pages = []; }
        if (pages[pages.length - 1] !== window.location.pathname) { pages.push(window.location.pathname); }
        if (pages.length > MAX_PAGES) { pages = pages.slice(pages.length - MAX_PAGES); }
        sessionStorage.setItem(NAV_KEY, JSON.stringify(pages));
        if (!localStorage.getItem('sq_first_visit')) {
          localStorage.setItem('sq_first_visit', new Date().toISOString());
          var ref = document.referrer;
          var src = 'direct';
          if (ref) { try { src = new URL(ref).hostname; } catch(e2) { src = ref; } }
          localStorage.setItem('sq_traffic_source', src);
          var params = new URLSearchParams(window.location.search);
          if (params.get('utm_source')) { localStorage.setItem('sq_utm_source', params.get('utm_source')); }
          if (params.get('utm_medium')) { localStorage.setItem('sq_utm_medium', params.get('utm_medium')); }
          if (params.get('utm_campaign')) { localStorage.setItem('sq_utm_campaign', params.get('utm_campaign')); }
        }
        if (!sessionStorage.getItem('sq_session_counted')) {
          sessionStorage.setItem('sq_session_counted', '1');
          var count = parseInt(localStorage.getItem('sq_session_count') || '0', 10);
          localStorage.setItem('sq_session_count', count + 1);
        }
      } catch(e) {}
    })();
  </script>

  <script>
    var base_url = "",
      pagination_next_url = base_url + '/page2',
      pagination_next_page_number = '{{ paginator.next_page }}',
      pagination_available_pages_number = '{{ paginator.total_pages }}';
  </script>
</body>

</html>
