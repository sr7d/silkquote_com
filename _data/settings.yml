#-------------------------------
# About Settings
author:
  author__bio: "After almost a decade in Quote-to-Cash, SilkQuote was built to serve the needs of Admins, Reps, and Prospects alike: something both standalone and compatible with other tools, designed for small businesses and enterprise teams across technology and business process.<br> In the beginning, SilkQuote was a hyperfunctional PDF quote generator. But generating the document doesn't complete the entire quoting journey.<br> After a year of development and testing, SilkQuote became a full quoting system: an intuitive platform for faster quote turnaround, branded quote PDFs, deal room collaboration, and online acceptance without external tools."

