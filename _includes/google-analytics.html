<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.data.settings.google-analytics }}');

  var _gtmLoaded = false;
  function _loadGTM() {
    if (_gtmLoaded) return;
    _gtmLoaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id={{ site.data.settings.google-analytics }}';
    document.head.appendChild(s);
  }
  ['scroll','mousemove','touchstart','click'].forEach(function(e) {
    window.addEventListener(e, _loadGTM, {once: true, passive: true});
  });
  setTimeout(_loadGTM, 4000);
</script>
