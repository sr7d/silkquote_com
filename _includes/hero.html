<section class="hero">
  <div id="heroDiv" class="container">
    <div class="row">
      <div class="col col-12">
        <div class="hero__content">
          <div class="hero__inner">
            <h1 class="hero__title">{{ site.data.settings.hero.hero__title }}</h1>
          </div>        
          <div class="hero__description__inner">
            <p class="hero__description">{{ site.data.settings.hero.hero__description }}</p>
          </div>
          <div class="hero__cta">
            {% if site.data.settings.install_url %}
              <a href="{{ site.data.settings.install_url }}" class="button button--primary" target="_self" rel="noopener">Install App</a>
            {% else %}
              <span class="button button--primary coming-soon" data-tooltip="Coming Soon">Install App</span>
            {% endif %}
            <a href="/SampleQuote.pdf" download class="button button--secondary">Download Sample</a>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col col-12">
        <div class="hero__video">
          <div class="video-container" id="hero-video-container">
            <div class="vimeo-facade" data-vimeo-id="1114259071" style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;">
              <picture>
                <source srcset="/images/hero-poster-sm.webp 480w, /images/hero-poster-md.webp 800w, /images/hero-poster-1024.webp 1024w, /images/hero-poster.webp 1280w" type="image/webp">
                <img src="/images/hero-poster.jpg" sizes="(max-width: 640px) calc(100vw - 30px), (max-width: 1024px) 800px, 1280px" alt="SilkQuote Demo Video" style="width:100%;height:100%;object-fit:cover;" loading="eager" fetchpriority="high" width="1280" height="720">
              </picture>
              <div class="video-overlay" id="video-overlay">
                <div class="play-icon">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
          <script>
            document.querySelector('.vimeo-facade').addEventListener('click', function(e) {
              e.stopPropagation();
              var iframe = document.createElement('iframe');
              iframe.src = 'https://player.vimeo.com/video/' + this.dataset.vimeoId + '/?autoplay=1&muted=0&loop=0&controls=1';
              iframe.setAttribute('frameborder', '0');
              iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
              iframe.setAttribute('allowfullscreen', '');
              iframe.setAttribute('title', 'SilkQuote Demo Video');
              iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:inherit;';
              this.parentNode.replaceChild(iframe, this);
            });
          </script>
        </div>
      </div>
    </div>
  <!-- {% if site.data.settings.hero.painpoint %}
    <div class="hero__painpoint-wrapper">
      <p class="hero__painpoint">{{ site.data.settings.hero.painpoint }}</p>
    </div>
  {% endif %}   -->
  </div>
</section>

<style>
  .hero__content {
    padding: 0;
    margin: 0;
  }

  .hero__painpoint-wrapper {
    text-align: center;
    margin-bottom: 0px;
    margin-top:  0px;
  }

  .hero__painpoint {
    color: #cc2200;
    font-family: 'Permanent Marker', cursive;
    font-size: 24px;
    margin: 0;
    letter-spacing: 0.09cap;
  }

  .hero__video {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    margin-top: 20px;
  }

  .video-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border-radius: var(--border-radius-large);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    transition: var(--transition-medium);
    cursor: pointer;
    margin: 0 auto;
  }

  .video-container:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
  }

  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: var(--border-radius-large);
  }

  .video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    border-radius: var(--border-radius-large);
    z-index: 10;
  }

  .video-overlay:hover {
    background: rgba(0, 0, 0, 0.4);
  }

  .play-icon {
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2c2c2c;
    opacity: 1;
    transform: scale(1);
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  }

  .video-overlay:hover .play-icon {
    transform: scale(1.1);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
  }

  /* Video Lightbox */
  .video-lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }

  .video-lightbox.active {
    opacity: 1;
    visibility: visible;
  }

  .video-lightbox-content {
    position: relative;
    width: 90%;
    max-width: 1200px;
    height: 0;
    padding-bottom: 56.25%;
    border-radius: 12px;
    overflow: hidden;
    background: transparent;
  }

  .video-lightbox iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    background: transparent;
    display: block;
  }

  .video-close {
    position: absolute;
    top: -50px;
    right: 0;
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid rgba(255, 255, 255, 1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .video-close:hover {
    background: rgba(255, 255, 255, 1);
    border-color: rgba(255, 255, 255, 1);
    transform: scale(1.1);
  }

  @media (max-width: 768px) {
    .hero__video {
      margin-top: 0;
      margin-bottom: 1.5rem;
      padding: 15px;
    }

    .video-container {
      border-radius: 8px;
    }

    .video-container iframe {
      border-radius: 8px;
    }

    .video-overlay {
      border-radius: 8px;
    }

    .video-lightbox-content {
      width: 95%;
      padding-bottom: 56.25%;
    }
  }

  @media (max-width: 576px) {
    .hero__video {
      margin-top: 0.25rem;
      padding: 10px;
    }

    .video-container {
      border-radius: 6px;
      box-shadow: var(--shadow-md);
    }

    .video-container iframe {
      border-radius: 6px;
    }

    .video-overlay {
      border-radius: 6px;
    }

    .video-container:hover {
      transform: translateY(-2px);
    }

    .play-icon {
      width: 56px;
      height: 56px;
    }

    .video-lightbox-content {
      width: 98%;
      padding-bottom: 56.25%;
    }

    .video-close {
      top: -40px;
      width: 36px;
      height: 36px;
    }
  }
</style>
