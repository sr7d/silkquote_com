<!-- begin pagination -->
<div class="container animate">
  {% assign postCount = site.posts | size %}
  {% assign postsCovered = site.paginate | plus:offset %}
  {% if postsCovered < postCount %}
  <div class="pagination">
    <button class="load-more-posts button button--primary">Load More</button>
  </div>
  {% endif %}
  <div class="pageSearch">
      <svg class="icon__search" width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="cursor:pointer;transition:transform 0.2s ease;" onclick="searchOpen()" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
</div>
<!-- end pagination -->
