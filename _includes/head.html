<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.seo_title %}{{ page.seo_title }} | SilkQuote{% elsif page.title %}{% unless page.title contains "SilkQuote" %}{{ page.title }} | SilkQuote{% else %}{{ page.title }}{% endunless %}{% else %}{{ site.data.settings.title }}{% endif %}</title>
  <meta name='description' content='{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.data.settings.description }}{% endif %}'>

  <link rel="icon" type="image/png" href="/images/SQ_Logo.png">

  <!-- SEO Meta Tags -->
  {% if paginator and paginator.page > 1 or page.robots == 'noindex' %}
  <meta name="robots" content="noindex, follow">
  <meta name="googlebot" content="noindex, follow">
  {% else %}
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  {% endif %}
  <meta name="author" content="{{ site.data.settings.author.author__name }}">
  <meta name="keywords" content="{% if page.tags %}{{ page.tags | join: ', ' }}{% else %}Salesforce, CPQ, Quote Generation, PDF, Business Automation{% endif %}">
  
  <!-- Preload LCP image -->
  {% if page.image %}<link rel="preload" as="image" href="{{ page.image | replace: '.png', '.webp' | absolute_url }}" type="image/webp">{% endif %}

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.data.settings.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == "/" %}{{ site.data.settings.title }}{% else %}{{ page.title }} – {{ site.data.settings.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.url == "/" %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}">
  <meta name="twitter:image:src" content="{{ page.image | absolute_url }}">

  <!-- Facebook OpenGraph -->
  <meta property="og:title" content="{% if page.url == "/" %}{{ site.data.settings.title }}{% else %}{{ page.title }} – {{ site.data.settings.title }}{% endif %}">
  <meta property="og:description" content="{% if page.url == "/" %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}">
  <meta property="og:image" content="{{ page.image | absolute_url }}">

  <!-- Structured Data for SEO -->
  {% include schema.html %}

  <!-- Fonts (self-hosted) -->
  <link rel="preload" href="/fonts/mulish-normal.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Hero LCP image preload (homepage) -->
  {% if page.url == "/" %}<link rel="preload" as="image" href="/images/hero-poster.webp" imagesrcset="/images/hero-poster-sm.webp 480w, /images/hero-poster-md.webp 800w, /images/hero-poster-1024.webp 1024w, /images/hero-poster.webp 1280w" imagesizes="(max-width: 640px) calc(100vw - 30px), (max-width: 1024px) 800px, 1280px" type="image/webp">{% endif %}

  <!-- Analytics -->
  <script defer data-domain="silkquote.com" src="https://datakool.com/tracker/script.js"></script>

  <!-- Critical above-fold CSS (inlined) -->
  <style>{% include critical.css %}</style>

  <!-- Full stylesheet (non-blocking) -->
  <link rel="preload" href="{{ '/assets/main.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet';var l=document.getElementById('page-loader');if(l){l.style.opacity='0';setTimeout(function(){l.remove()},260)}">
  <noscript><link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}"><style>#page-loader{display:none}</style></noscript>
</head>
